name: Build OwnCord Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client/tauri-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Client/tauri-client/src-tauri

      - name: Install frontend dependencies
        working-directory: Client/tauri-client
        run: npm ci

      - name: Build Tauri app
        working-directory: Client/tauri-client
        run: npm run tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: OwnCord-Windows-Installer
          path: |
            Client/tauri-client/src-tauri/target/release/bundle/nsis/*.exe
            Client/tauri-client/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
